<!DOCTYPE html>
<html>

<head>
    <title>Submit Customer Email</title>
</head>
<body>
    <h2>Submit Customer Email</h2>
    <form method="POST">
        <label>Customer Email:</label><br>
        <input type="email" name="customer_email" required><br><br>

        <label>Subject:</label><br>
        <input type="text" name="subject" required><br><br>

        <label>Email Body:</label><br>
        <input type="text" name="body" required><br><br>
        
        <button type="submit">Submit</button>
    </form>
</body>
</html>
