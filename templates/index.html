{% extends "base.html" %}
{% block title %}MailIQ — New Ticket{% endblock %}
{% block page_title %}Create New Ticket{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div data-animate class="bg-white rounded-2xl border border-gray-100 shadow-sm p-8">
        <div class="flex items-center gap-3 mb-6">
            <div class="w-10 h-10 rounded-xl bg-indigo-100 flex items-center justify-center">
                <svg class="w-5 h-5 text-indigo-600" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75"/></svg>
            </div>
            <div>
                <h2 class="text-lg font-bold text-gray-800">Submit Customer Email</h2>
                <p class="text-sm text-gray-500">Manually create a support ticket for processing</p>
            </div>
        </div>

        <form method="POST" action="/new-ticket" class="space-y-5">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5">Customer Email</label>
                <input type="email" name="customer_email" required placeholder="customer@example.com"
                    class="input input-bordered w-full bg-gray-50/50 focus:bg-white focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100 transition-all rounded-xl" />
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5">Subject</label>
                <input type="text" name="subject" required placeholder="E.g. Order not received"
                    class="input input-bordered w-full bg-gray-50/50 focus:bg-white focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100 transition-all rounded-xl" />
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5">Email Body</label>
                <textarea name="body" required rows="6" placeholder="Paste the full email content here..."
                    class="textarea textarea-bordered w-full bg-gray-50/50 focus:bg-white focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100 transition-all rounded-xl text-sm leading-relaxed"></textarea>
            </div>
            <div class="flex items-center gap-3 pt-2">
                <button type="submit"
                    class="btn border-0 text-white bg-gradient-to-r from-indigo-500 to-indigo-600 hover:from-indigo-600 hover:to-indigo-700 shadow-lg shadow-indigo-200 rounded-xl font-semibold px-8">
                    Submit Ticket
                </button>
                <a href="/dashboard" class="btn btn-ghost rounded-xl text-gray-500 font-medium">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
