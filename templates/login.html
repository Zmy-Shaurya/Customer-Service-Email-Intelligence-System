<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MailIQ — Login</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
                }
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
</head>
<body class="bg-zinc-50 flex items-center justify-center min-h-screen font-sans antialiased text-zinc-900 selection:bg-indigo-100 selection:text-indigo-900">

    <div id="login-container" class="w-full max-w-md p-6">
        
        <!-- Logo -->
        <div class="flex justify-center mb-8">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-indigo-600 flex items-center justify-center shadow-sm">
                    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75"/></svg>
                </div>
                <span class="text-2xl font-bold tracking-tight text-zinc-900">MailIQ</span>
            </div>
        </div>

        <!-- Card -->
        <div class="bg-white rounded-2xl shadow-sm border border-zinc-200 p-8">
            <div class="text-center mb-8">
                <h1 class="text-xl font-bold text-zinc-900 tracking-tight">Welcome back</h1>
                <p class="text-sm text-zinc-500 mt-1">Sign in to your agent account</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="p-3 mb-6 text-sm rounded-lg border 
                            {% if category == 'error' %}bg-red-50 text-red-600 border-red-200{% else %}bg-zinc-50 text-zinc-600 border-zinc-200{% endif %}" role="alert">
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form action="/login" method="POST" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-zinc-700 mb-1.5">Username</label>
                    <input type="text" name="username" required class="py-2.5 px-4 block w-full border border-zinc-200 rounded-lg text-sm focus:border-indigo-500 focus:ring-indigo-500 disabled:opacity-50 disabled:pointer-events-none transition-colors" placeholder="Enter your username">
                </div>
                <div>
                    <div class="flex justify-between items-center mb-1.5">
                        <label class="block text-sm font-medium text-zinc-700">Password</label>
                    </div>
                    <input type="password" name="password" required class="py-2.5 px-4 block w-full border border-zinc-200 rounded-lg text-sm focus:border-indigo-500 focus:ring-indigo-500 disabled:opacity-50 disabled:pointer-events-none transition-colors" placeholder="••••••••">
                </div>
                
                <div class="pt-2">
                    <button type="submit" class="w-full py-2.5 px-4 inline-flex justify-center items-center gap-2 rounded-lg font-semibold bg-indigo-600 text-white hover:bg-indigo-700 focus:outline-none focus:bg-indigo-700 shadow-sm transition-colors text-sm">
                        Sign In
                    </button>
                </div>
            </form>
        </div>
        
        <p class="text-center text-xs text-zinc-400 mt-8">
            &copy; 2026 MailIQ. All rights reserved.
        </p>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            gsap.from('#login-container', {
                opacity: 0,
                y: 20,
                duration: 0.6,
                ease: 'power3.out'
            });
        });
    </script>
</body>
</html>
